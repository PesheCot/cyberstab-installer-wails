name: Build Linux installer

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - ".github/**"

jobs:
  # Universal GUI+CLI (glibc 2.28+): Astra, Ubuntu, Debian, ALT, RED OS, Основа, etc.
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build on Debian buster (max compatibility)
        run: |
          docker build -f Dockerfile.linux-buster -t cyberstab-wails-buster .
          cid=$(docker create cyberstab-wails-buster)
          mkdir -p build/bin
          docker cp "$cid:/src/build/bin/install" build/bin/install-linux
          docker cp "$cid:/src/build/bin/cyberstab-uninstaller" build/bin/cyberstab-uninstaller-linux
          docker rm "$cid"

      - name: Upload universal installer
        uses: actions/upload-artifact@v4
        with:
          name: cyberstab-install-linux-amd64
          path: |
            build/bin/install-linux
            build/bin/cyberstab-uninstaller-linux
          if-no-files-found: error

  # Static CLI-only fallback (any glibc, headless servers)
  build-linux-static:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build static CLI binaries
        run: |
          chmod +x build-linux-cli.sh
          ./build-linux-cli.sh

      - name: Upload static CLI
        uses: actions/upload-artifact@v4
        with:
          name: cyberstab-install-linux-static-amd64
          path: |
            build/bin/install-linux-static
            build/bin/cyberstab-uninstaller-static
          if-no-files-found: error
